<!DOCTYPE html>
<html>
<head>
    <title>Gallery - My Personal Website</title>

    <style>
       body {
        margin: 0;
        font-family: "Georgia", serif;

        background-image: url("background4.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;

        color: #3d3d3d;
    }

        
        .nav {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.6);
        }

        .nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #4a4a4a;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-weight: normal;
            margin: 30px 0;
        }

        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        
        .card {
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        video {
            width: 100%;
            border-radius: 12px;
        }

        
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #c7d6c2;
            color: #333;
        }

        button:hover {
            background: #b7c9b0;
        }

       
        .comments {
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 60px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 8px;
            font-family: "Georgia";
        }

        .comment-box {
            margin-top: 8px;
            padding: 8px;
            background: #fffaf3;
            border-radius: 10px;
            font-size: 13px;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">← Back to Home</a>

</div>

<div class="container">

    <h1>My Diploma Gallery</h1>

    <div class="grid">

        
        <div class="card">
            <video id="vid1" src="video1.mp4" controls></video>

            <div class="controls">
                <button onclick="playVideo('vid1')">Play</button>
                <button onclick="pauseVideo('vid1')">Pause</button>
            </div>
       
</div>

<script>
    function playVideo(id) {
        document.getElementById(id).play();
    }

    function pauseVideo(id) {
        document.getElementById(id).pause();
    }

</script>

</body>
</html>
